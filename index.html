<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G-</title>

<link rel="stylesheet" href="style.css">

<style>

/* fallback styling so page works without CSS file */

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:white;
color:#202124;
display:flex;
flex-direction:column;
height:100vh;
}

.topbar{
display:flex;
justify-content:flex-end;
align-items:center;
gap:18px;
padding:16px 24px;
font-size:14px;
}

.topbar a{
text-decoration:none;
color:#202124;
}

.apps{
display:grid;
grid-template-columns:repeat(3,5px);
gap:4px;
}

.apps div{
width:5px;
height:5px;
background:#555;
border-radius:50%;
}

.signin{
background:#1a73e8;
border:none;
color:white;
padding:8px 16px;
border-radius:4px;
cursor:pointer;
}

.main{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.logo{
font-size:64px;
font-weight:600;
margin-bottom:30px;
}

.searchbar{
display:flex;
align-items:center;
border:1px solid #dfe1e5;
border-radius:30px;
padding:10px 14px;
width:580px;
max-width:90%;
}

.searchbar input{
border:none;
outline:none;
flex:1;
font-size:16px;
padding:6px;
}

.search-icon{
width:20px;
height:20px;
margin-right:10px;
}

.shortcuts{
margin-top:40px;
display:grid;
grid-template-columns:repeat(4,100px);
gap:24px;
}

.tile{
text-align:center;
cursor:pointer;
}

.tile-icon{
width:48px;
height:48px;
background:#f1f3f4;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
margin:auto;
margin-bottom:6px;
}

.footer{
background:#f2f2f2;
padding:12px 24px;
font-size:14px;
}

</style>

</head>

<body>

<!-- Top navigation -->

<header class="topbar">

<a href="#">Gmail</a>
<a href="#">Images</a>

<div class="apps">
<div></div><div></div><div></div>
<div></div><div></div><div></div>
<div></div><div></div><div></div>
</div>

<button class="signin">Sign in</button>

</header>


<!-- Main search area -->

<main class="main">

<div class="logo">G-</div>

<div class="searchbar">

<svg class="search-icon" viewBox="0 0 24 24">
<path fill="#9aa0a6"
d="M15.5 14h-.79l-.28-.27
A6.471 6.471 0 0016 9.5
6.5 6.5 0 109.5 16
c1.61 0 3.09-.59
4.23-1.57l.27.28v.79
L20 21.5 21.5 20l-6-6zM9.5 14
A4.5 4.5 0 119.5 5a4.5
4.5 0 010 9z"/>
</svg>

<input
id="searchInput"
type="text"
placeholder="Search the web or type a URL"
>

</div>


<!-- Shortcuts -->

<div class="shortcuts">

<div class="tile" onclick="go('https://youtube.com')">
<div class="tile-icon">▶</div>
<span>YouTube</span>
</div>

<div class="tile" onclick="go('https://github.com')">
<div class="tile-icon">GH</div>
<span>GitHub</span>
</div>

<div class="tile" onclick="go('https://reddit.com')">
<div class="tile-icon">R</div>
<span>Reddit</span>
</div>

<div class="tile" onclick="go('https://openai.com')">
<div class="tile-icon">AI</div>
<span>AI</span>
</div>

</div>

</main>


<footer class="footer">
Lightweight AI-assisted browser interface
</footer>


<script src="script.js"></script>

<script>

/* fallback search logic */

function performSearch(){

const input = document.getElementById("searchInput").value.trim()

if(!input) return

if(input.includes(".") && !input.includes(" ")){

location.href = "https://" + input

}else{

location.href =
"https://www.google.com/search?q=" + encodeURIComponent(input)

}

}

document.getElementById("searchInput")
.addEventListener("keydown",function(e){

if(e.key==="Enter") performSearch()

})

function go(url){
location.href = url
}

</script>

</body>
</html>
